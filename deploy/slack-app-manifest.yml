# Slack App Manifest for Clew
#
# Usage:
#   1. Go to https://api.slack.com/apps
#   2. Click "Create New App" > "From an app manifest"
#   3. Select workspace and paste this YAML
#   4. After creation, click "Install to Workspace"
#
# After creation and installation, copy:
#   - Signing Secret  -> AWS Secrets Manager: clew/slack-signing-secret
#   - Bot User Token  -> AWS Secrets Manager: clew/slack-bot-token
#
# Post-deployment (Phase 7):
#   Configure Event Subscriptions manually in the Slack UI:
#   - Enable Events, set Request URL: https://clew.yourdomain.com/slack/events
#   - Subscribe to bot events: assistant_thread_started, assistant_thread_context_changed, message.im
#
# IMPORTANT: Event subscriptions are NOT in this manifest because Slack requires a
# verified Request URL at creation time. Configure them AFTER the app is deployed.

display_information:
  name: Clew
  description: "The thread through the labyrinth — organizational intelligence assistant"
  background_color: "#1a1a2e"

features:
  bot_user:
    display_name: Clew
    always_online: true

oauth_config:
  scopes:
    bot:
      - assistant:write
      - chat:write
      - im:history
      - im:read
      - im:write

settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
