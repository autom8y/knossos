# Slack App Manifest for Clew
#
# Usage:
#   1. Go to https://api.slack.com/apps
#   2. Click "Create New App" > "From an app manifest"
#   3. Select workspace and paste this YAML
#   4. Replace ${ALB_DNS} with the Terraform output: alb_dns_name
#
# After creation, copy:
#   - Signing Secret  -> AWS Secrets Manager: clew/slack-signing-secret
#   - Bot User Token  -> AWS Secrets Manager: clew/slack-bot-token

display_information:
  name: Clew
  description: "The thread through the labyrinth \u2014 organizational intelligence assistant"
  background_color: "#1a1a2e"

features:
  assistant_view:
    enabled: true
  bot_user:
    display_name: Clew
    always_online: true

oauth_config:
  scopes:
    bot:
      - assistant:write
      - chat:write
      - im:history
      - im:read
      - im:write

settings:
  event_subscriptions:
    # Replace ${ALB_DNS} with your ALB DNS name from Terraform output
    request_url: "https://${ALB_DNS}/slack/events"
    bot_events:
      - assistant_thread_started
      - message.im
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
