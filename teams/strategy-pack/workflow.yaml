name: strategy-pack
workflow_type: sequential
description: Market research, competitive analysis, business modeling, and strategic planning

entry_point:
  agent: market-researcher
  artifact:
    type: market-analysis
    path_template: docs/strategy/MARKET-{slug}.md

phases:
  - name: market-research
    agent: market-researcher
    produces: market-analysis
    next: competitive-analysis

  - name: competitive-analysis
    agent: competitive-analyst
    produces: competitive-intel
    next: business-modeling
    condition: "complexity >= STRATEGIC"

  - name: business-modeling
    agent: business-model-analyst
    produces: financial-model
    next: strategic-planning

  - name: strategic-planning
    agent: roadmap-strategist
    produces: strategic-roadmap
    next: null

complexity_levels:
  - name: TACTICAL
    scope: "Single decision, existing market data"
    phases: [business-modeling, strategic-planning]

  - name: STRATEGIC
    scope: "New market entry, major product bet"
    phases: [market-research, competitive-analysis, business-modeling, strategic-planning]

  - name: TRANSFORMATION
    scope: "Business model change, company pivot"
    phases: [market-research, competitive-analysis, business-modeling, strategic-planning]

# Agent roles for command mapping:
# /architect   → competitive-analyst
# /build       → business-model-analyst
# /qa          → roadmap-strategist
# /hotfix      → (N/A - strategy team)
# /code-review → (N/A - strategy team)

back_routes:
  - source_phase: strategic-planning
    trigger: "fail(acceptance_criteria)"
    target_phase: market-research
    target_agent: market-researcher
    requires_user_confirmation: true
    condition: "Failure is requirement gap, not implementation bug"

  - source_phase: strategic-planning
    trigger: "fail(implementation)"
    target_phase: business-modeling
    target_agent: business-model-analyst
    requires_user_confirmation: false
    condition: "Failure is implementation bug"

  - source_phase: business-modeling
    trigger: "design_conflict"
    target_phase: competitive-analysis
    target_agent: competitive-analyst
    requires_user_confirmation: false
    condition: "Implementation reveals design flaw"

  # Back-routes for invalidated assumptions during analysis
  - source_phase: competitive-analysis
    trigger: "market_assumption_invalidated"
    target_phase: market-research
    target_agent: market-researcher
    requires_user_confirmation: true
    condition: "Market assumption invalidated by competitive data"
    context_to_pass:
      - invalidated_assumption: "The specific market assumption proven false"
      - competitive_evidence: "Data/findings that invalidated the assumption"
      - affected_segments: "Market segments impacted by this invalidation"
      - research_questions: "Specific questions needing re-investigation"
    expected_outcome: "Updated market analysis with corrected assumptions and re-validated market sizing"

  - source_phase: business-modeling
    trigger: "unit_economics_unsustainable"
    target_phase: market-research
    target_agent: market-researcher
    requires_user_confirmation: true
    condition: "Unit economics unsustainable, need market re-validation"
    context_to_pass:
      - failing_metrics: "Which unit economics metrics are unsustainable (CAC, LTV, margins)"
      - threshold_gaps: "How far current projections miss sustainability thresholds"
      - pricing_constraints: "Price points that model requires vs market expectations"
      - volume_requirements: "Scale needed for sustainability"
    expected_outcome: "Re-validated market data confirming achievable price points, volumes, or alternative segments"

  - source_phase: business-modeling
    trigger: "competitive_assumption_invalidated"
    target_phase: competitive-analysis
    target_agent: competitive-analyst
    requires_user_confirmation: false
    condition: "Competitive assumption invalidated by model analysis"
    context_to_pass:
      - invalidated_assumption: "The competitive assumption proven false by modeling"
      - model_evidence: "Financial model outputs that contradict assumption"
      - required_differentiation: "What competitive position would make model viable"
      - pricing_implications: "How competitive pricing affects model sustainability"
    expected_outcome: "Updated competitive intel with corrected assumptions and alternative positioning strategies"