name: hygiene-pack
workflow_type: sequential
description: Code quality lifecycle (Smell → Plan → Clean → Audit)

entry_point:
  agent: code-smeller
  artifact:
    type: smell-report
    path_template: docs/hygiene/SMELL-{slug}.md

phases:
  - name: assessment
    agent: code-smeller
    produces: smell-report
    next: planning

  - name: planning
    agent: architect-enforcer
    produces: refactor-plan
    next: execution

  - name: execution
    agent: janitor
    produces: commits
    next: audit

  - name: audit
    agent: audit-lead
    produces: audit-signoff
    next: null

complexity_levels:
  - name: SPOT
    scope: "Single smell fix"
    phases: [execution, audit]
  - name: MODULE
    scope: "Module-level cleanup"
    phases: [assessment, planning, execution, audit]
  - name: CODEBASE
    scope: "Full codebase hygiene"
    phases: [assessment, planning, execution, audit]

# Agent roles for command mapping:
# /architect  → architect-enforcer
# /build      → janitor
# /qa         → audit-lead
# /hotfix     → janitor (fast path)
# /code-review → audit-lead (review mode)
