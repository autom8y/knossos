name: rnd-pack
workflow_type: sequential
description: Technology scouting, integration analysis, prototyping, and future architecture

entry_point:
  agent: technology-scout
  artifact:
    type: tech-assessment
    path_template: docs/rnd/SCOUT-{slug}.md

phases:
  - name: scouting
    agent: technology-scout
    produces: tech-assessment
    next: integration-analysis

  - name: integration-analysis
    agent: integration-researcher
    produces: integration-map
    next: prototyping
    condition: "complexity >= EVALUATION"

  - name: prototyping
    agent: prototype-engineer
    produces: prototype
    next: future-architecture

  - name: future-architecture
    agent: moonshot-architect
    produces: moonshot-plan
    next: null

complexity_levels:
  - name: SPIKE
    scope: "Quick feasibility check, single technology"
    phases: [scouting, prototyping]

  - name: EVALUATION
    scope: "Full technology evaluation with integration analysis"
    phases: [scouting, integration-analysis, prototyping, future-architecture]

  - name: MOONSHOT
    scope: "Paradigm shift exploration, multi-year architecture"
    phases: [scouting, integration-analysis, prototyping, future-architecture]

# Agent roles for command mapping:
# /architect   → integration-researcher
# /build       → prototype-engineer
# /qa          → moonshot-architect
# /hotfix      → (N/A - R&D team)
# /code-review → (N/A - R&D team)
