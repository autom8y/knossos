name: Ariadne Tests

on:
  push:
    branches: [main]
    paths:
      - 'ariadne/**'
      - '.github/workflows/ariadne-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ariadne/**'
      - '.github/workflows/ariadne-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ariadne

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: ariadne/go.sum

      - name: Run tests
        run: CGO_ENABLED=0 go test -v ./...

      - name: Run tests with race detector
        run: go test -race -v ./... || echo "Race tests completed (may fail on some platforms)"
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ariadne

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: ariadne/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: ariadne
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ariadne

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: ariadne/go.sum

      - name: Build
        run: CGO_ENABLED=0 go build -o ari ./cmd/ari

      - name: Verify binary
        run: ./ari --help
