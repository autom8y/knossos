# Deploy Clew — CI/CD pipeline for the @clew Slack bot
#
# Infrastructure provisioned by: deploy/terraform/
# Operator setup guide:          deploy/SETUP.md
#
# Required GitHub Secrets:
#   AWS_ACCOUNT_ID  — 12-digit AWS account number (used to build IAM role ARN)
#
# Required GitHub Variables:
#   OTEL_ENDPOINT   — OTLP HTTP endpoint (leave empty to disable tracing)
#
# Terraform outputs that feed this pipeline:
#   clew-cluster          (ECS_CLUSTER)
#   clew-service          (ECS_SERVICE)
#   clew-github-actions   (OIDC role name)
#   clew ECR repo         (ECR_REPOSITORY)

name: Deploy Clew

on:
  push:
    branches: [main]
    paths:
      - 'deploy/**'
      - 'internal/serve/**'
      - 'internal/slack/**'
      - 'internal/reason/**'
      - 'internal/observe/**'
      - 'internal/trust/**'
      - 'internal/search/**'
      - 'internal/cmd/serve/**'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: clew
  ECS_CLUSTER: clew-cluster
  ECS_SERVICE: clew-service

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: CGO_ENABLED=0 go test ./...

  build-and-deploy:
    name: Build and Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/clew-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f deploy/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Render ECS task definition
        # Substitutes placeholders in deploy/ecs-task-definition.json:
        #   ${AWS_ACCOUNT_ID}  — from GitHub secret
        #   ${AWS_REGION}      — from workflow env
        #   ${ECR_REGISTRY}    — from ECR login output
        #   ${IMAGE_TAG}       — git commit SHA
        #   ${OTEL_ENDPOINT}   — from GitHub variable (may be empty)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          OTEL_ENDPOINT: ${{ vars.OTEL_ENDPOINT }}
        run: |
          envsubst '$AWS_ACCOUNT_ID $AWS_REGION $ECR_REGISTRY $IMAGE_TAG $OTEL_ENDPOINT' \
            < deploy/ecs-task-definition.json \
            > /tmp/task-definition.json
          echo "--- Rendered task definition (secrets redacted) ---"
          grep -v 'secretsmanager' /tmp/task-definition.json || true

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: /tmp/task-definition.json
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Verify deployment health
        run: |
          echo "Verifying ECS service is stable..."
          aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION \
            --query 'services[0].{status:status,desired:desiredCount,running:runningCount,deployments:length(deployments)}' \
            --output table
          echo "Deployment verified."
