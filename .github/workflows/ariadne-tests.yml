name: Ariadne Tests

on:
  pull_request:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'test/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/ariadne-tests.yml'
      - '.golangci.yml'
  push:
    branches:
      - main
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'test/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/ariadne-tests.yml'
      - '.golangci.yml'
  workflow_dispatch:

jobs:
  test:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download Dependencies
        run: go mod download

      - name: Run Tests
        run: CGO_ENABLED=0 go test -v ./...

      - name: Run Tests with Race Detector
        # Race detector requires CGO on some platforms, skip if it fails
        run: go test -race -v ./... || echo "Race detector tests skipped (CGO required)"
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build Binary
        run: CGO_ENABLED=0 go build -o ari ./cmd/ari/main.go

      - name: Verify Binary
        run: ./ari --help
