name = 'data-analyst'
description = 'Quick switch to data-analyst (analytics semantic layer lifecycle)'
prompt = "---\nname: data-analyst\ndescription: Quick switch to data-analyst (analytics semantic layer lifecycle)\nargument-hint: \"[--overwrite-diverged] [--dry-run] [--keep-orphans]\"\nallowed-tools: Bash, Read\nmodel: haiku\ndisable-model-invocation: true\ncontext: fork\n---\n\n## Context\n\nAuto-injected by SessionStart hook (project, rite, session, git).\n\n## Your Task\n\nSwitch to the data-analyst rite and display the pantheon. $ARGUMENTS\n\n## Behavior\n\n1. Execute: `ari sync --rite data-analyst $ARGUMENTS`\n2. Display the pantheon output from ari (agents and their roles)\n3. If SESSION_CONTEXT exists, update `active_rite` to `data-analyst`\n\nAfter the switch, display this condensed overview:\n\n```\nDATA ANALYST - Analytics Semantic Layer Rite\n=============================================\n\nMetric modeling, query compilation, insight composition, data quality,\nand adversarial validation for the autom8y-data analytics layer.\n\nAGENTS (5):\n  Metric Architect      - Metric definitions, formula selection, constraints\n  Query Strategist      - Query compilation, Cartesian prevention, join validation\n  Insight Engineer      - InsightDefinition composition, freshness config\n  Data Quality Sentinel - Freshness routing, materialization health, schema validation\n  Analytics QA          - Adversarial testing, golden master regression, perf SLA\n\nCOMPLEXITY LEVELS:\n  METRIC   - Single metric add/change           [modeling, validation]\n  INSIGHT  - New insight or insight modification [modeling, compilation, composition, validation]\n  PIPELINE - Cross-cutting analytics change      [modeling, compilation, composition, quality, validation]\n\nWORKFLOW:\n  modeling -> compilation -> composition -> quality -> validation\n\nSELECTION GUIDE:\n  Single metric with known formula?            -> METRIC\n  New insight with standard metrics?           -> INSIGHT\n  Post-processor or computed field?            -> INSIGHT\n  Changing sql_generator/QueryBuilder?         -> PIPELINE\n  Temporal joins, multi-fact, rolling agg?     -> PIPELINE\n  DataPolicy, staleness, circuit breaker?      -> PIPELINE\n```\n\n## Flags\n\n| Flag | Description |\n|------|-------------|\n| `--overwrite-diverged` | Force regeneration of diverged files |\n| `--dry-run` | Preview changes without applying |\n| `--keep-orphans` | Preserve orphaned knossos files (default: auto-remove) |\n\n## When to Use\n\n- Adding or modifying QueryableMetric or CompositeMetric definitions\n- Designing new InsightDefinitions or modifying existing ones\n- Reviewing changes to the query compilation pipeline (sql_generator, QueryBuilder, joins)\n- Diagnosing data freshness, materialization health, or ConnectionRouter behavior\n- Writing adversarial tests for analytics correctness (Cartesian, composite ordering, COUNT_DISTINCT)\n- Any work within the analytics semantic layer (between raw data and API serialization)\n\n## Rite Capabilities\n\nThis rite specializes in:\n- Metric modeling with correct formula class selection (Division/CostDivision/Percentage/Per20k)\n- Multi-fact split query detection and Cartesian product prevention\n- Temporal join validation (ON vs WHERE, dedup alias, attribution date sources)\n- InsightDefinition composition with freshness-aware configuration\n- Data quality monitoring across the CQRS pipeline (MySQL writes, DuckDB-over-Parquet reads)\n- Adversarial testing targeting correctness traps specific to this analytics layer\n\n## Workflow Phases\n\n```\nmodeling -> compilation -> composition -> quality -> validation\n   |            |              |            |           |\n   v            v              v            v           v\nmetric-      query-        insight-     data-quality  analytics-\narchitect    strategist    engineer     sentinel      qa\n```\n\n## Reference\n\nFull documentation: `rites/data-analyst/mena/data-analyst-ref/SKILL.md`\nUser arguments: {{args}}"
