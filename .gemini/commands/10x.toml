name = '10x'
description = 'Quick switch to 10x-dev (full development workflow)'
prompt = "---\nname: 10x\ndescription: Quick switch to 10x-dev (full development workflow)\nargument-hint: \"[--overwrite-diverged] [--dry-run] [--keep-orphans]\"\nallowed-tools: Bash, Read\nmodel: haiku\ndisable-model-invocation: true\ncontext: fork\n---\n\n## Context\nAuto-injected by SessionStart hook (project, rite, session, git).\n\n## Your Task\n\nSwitch to the 10x development rite and display the pantheon. $ARGUMENTS\n\n## Behavior\n\n1. Execute: `ari sync --rite 10x-dev $ARGUMENTS`\n2. Display the pantheon output from ari (agents and their roles)\n3. Confirm `ari sync` output shows the correct active rite\n\n## Flags\n\n| Flag | Description |\n|------|-------------|\n| `--overwrite-diverged` | Force regeneration of diverged files |\n| `--dry-run` | Preview changes without applying |\n| `--keep-orphans` | Preserve orphaned knossos files (default: auto-remove) |\n\n## When to Use\n\n- Starting feature development\n- Full PRD -> TDD -> Code -> QA workflows\n- Any work requiring the 4-agent development lifecycle\n\n## Reference\n\nFull documentation: `.claude/skills/10x-ref/SKILL.md`\nUser arguments: {{args}}"
