name = 'eval-agent'
description = 'Test a single agent in isolation'
prompt = "---\ndescription: Test a single agent in isolation\nname: eval-agent\nargument-hint: \"<agent-name> [--rite=<rite-name>] [--adversarial]\"\nallowed-tools: Bash, Glob, Grep, Read, Task, TodoWrite\nmodel: opus\n---\n\n## Context\n\nAuto-injected by SessionStart hook (project, rite, session context).\n\n## Your Task\n\nTest the agent: $ARGUMENTS\n\n## Behavior\n\n### 1. Parse Arguments\n\n- `agent-name`: Required. Name of agent to test (e.g., `principal-engineer`)\n- `--rite`: Optional. Rite containing the agent. Defaults to active rite.\n- `--adversarial`: Optional. Include adversarial prompts in testing.\n\n### 2. Locate Agent\n\nFind agent file at:\n- `.claude/agents/{agent-name}.md` (if in active rite)\n- `$KNOSSOS_HOME/rites/{rite-name}/agents/{agent-name}.md` (if rite specified)\n- `~/.claude/agents/{agent-name}.md` (if global agent)\n\nIf not found, report error with available agents.\n\n### 3. Invoke Eval Specialist\n\nUse the Task tool to invoke the eval-specialist agent:\n\n```\n\"Test the agent {agent-name} in isolation.\n\nAgent file: {path-to-agent}\n\nRun the following checks:\n1. Completeness - All 11 sections present\n2. Frontmatter - Required fields valid\n3. Examples - Realistic and helpful\n4. Anti-patterns - Specific and actionable\n5. Token count - Within budget\n\n{If --adversarial}\nAlso run adversarial prompts:\n- Ambiguous requests\n- Out-of-scope requests\n- Conflicting requirements\n- Edge cases for this agent's domain\n\nReport pass/fail for each check with specific findings.\"\n```\n\n### 4. Report Results\n\nDisplay test results:\n\n```\nAGENT EVAL: {agent-name}\n========================\nLocation: {path}\nModel: {model from frontmatter}\n\nCompleteness:  {✓|✗}\nFrontmatter:   {✓|✗}\nExamples:      {✓|✗}\nAnti-patterns: {✓|✗}\nToken count:   {N} tokens {✓|✗}\n\n{If adversarial}\nAdversarial:   {✓|✗}\n  - Ambiguous:    {result}\n  - Out-of-scope: {result}\n  - Conflicting:  {result}\n  - Edge cases:   {result}\n\nOverall: {PASS | FAIL}\n{Any specific issues found}\n```\n\n## Example Usage\n\n```bash\n# Test agent in active rite\n/eval-agent principal-engineer\n\n# Test agent in specific rite\n/eval-agent threat-modeler --rite=security\n\n# Test with adversarial prompts\n/eval-agent architect --adversarial\n\n# Test global agent\n/eval-agent pythia\n```\n\n## Reference\n\nFull documentation: `.claude/skills/forge-ref/INDEX.md`\nAgent completeness checklist: see `agent-prompt-engineering` skill validation checklist\nUser arguments: {{args}}"
