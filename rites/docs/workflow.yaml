name: docs
workflow_type: sequential
description: Documentation lifecycle (Audit → Structure → Write → Review)

# entry_point: The first specialist in the domain workflow (not the CC routing agent).
# The CC routing agent is manifest.yaml:entry_agent (always pythia for orchestrated rites).
entry_point:
  agent: doc-auditor
  artifact:
    type: audit-report
    path_template: docs/audits/AUDIT-{slug}.md

phases:
  - name: audit
    agent: doc-auditor
    produces: audit-report
    next: architecture

  - name: architecture
    agent: information-architect
    produces: doc-structure
    next: writing
    condition: "complexity >= SECTION"

  - name: writing
    agent: tech-writer
    produces: documentation
    next: review

  - name: review
    agent: doc-reviewer
    produces: review-signoff
    next: null

complexity_levels:
  - name: PAGE
    scope: "Single document"
    phases: [writing, review]
  - name: SECTION
    scope: "Multiple related documents"
    phases: [architecture, writing, review]
  - name: SITE
    scope: "Full documentation site"
    phases: [audit, architecture, writing, review]

# Agent roles for command mapping:
# /architect  → information-architect
# /build      → tech-writer
# /qa         → doc-reviewer
# /hotfix     → tech-writer (fast path)
# /code-review → doc-reviewer (review mode)

back_routes:
  - source_phase: review
    trigger: "fail(acceptance_criteria)"
    target_phase: audit
    target_agent: doc-auditor
    requires_user_confirmation: true
    condition: "Failure is requirement gap, not implementation issue"

  - source_phase: review
    trigger: "fail(implementation)"
    target_phase: writing
    target_agent: tech-writer
    requires_user_confirmation: false
    condition: "Failure is writing quality issue"

  - source_phase: writing
    trigger: "design_conflict"
    target_phase: architecture
    target_agent: information-architect
    requires_user_confirmation: false
    condition: "Writing reveals architecture flaw"
