concepts:
  - name: "tier precedence"
    understanding: "Settings merge in strict order: skeleton < project < team < user. Higher tiers override lower for scalars. This creates a predictable cascade where user preferences always win."
    confidence: high
    source_refs:
      - "tier-overview"
      - "merge-algorithm"

  - name: "array merge strategies"
    understanding: "Arrays can merge via three strategies: replace (default, higher tier wins), append (concatenate), or merge (union/set semantics). Strategy is configured per-key in schema."
    confidence: high
    source_refs:
      - "array-strategies"

  - name: "recursive object merge"
    understanding: "Nested objects merge recursively, applying tier precedence at each level. A user setting at any depth can override skeleton defaults."
    confidence: medium
    source_refs:
      - "merge-algorithm"

  - name: "null handling"
    understanding: "Explicit null removes the key from merged result. This allows higher tiers to 'unset' lower tier values. Undefined (missing key) does not override."
    confidence: high
    source_refs:
      - "conflict-resolution"

