canonical_sections:
  - id: "tier-overview"
    heading: "Configuration Tier Model"
    authority_source: ".claude/skills/doc-ecosystem/INDEX.lego.md"
    content_summary: "Settings are organized into four tiers that merge during sync. Each tier serves a specific scope, from global defaults (skeleton) to personal preferences (user)."
    key_points:
      - "Four tiers in precedence order: skeleton < project < team < user"
      - "Higher tiers override lower tiers for scalar values"
      - "Each tier has a specific purpose and scope"
      - "Tiers are loaded from well-known file locations"
    code_examples:
      - language: text
        snippet: |
          Tier Locations:
          skeleton:  .claude/settings.skeleton.json
          project:   .claude/settings.local.json
          team:      .claude/settings.rite.json (shared)
          user:      ~/.config/claude/settings.json
        source: ".claude/skills/doc-ecosystem/INDEX.lego.md:156"
    cross_references:
      - target: "merge-algorithm"
        relationship: depends_on

  - id: "merge-algorithm"
    heading: "Merge Algorithm"
    authority_source: "docs/design/TDD-0042-settings.md"
    content_summary: "The merge algorithm processes tiers in order, applying type-specific merge rules. Scalars replace, objects merge recursively, arrays follow configurable strategies."
    key_points:
      - "Process tiers in order: skeleton -> project -> team -> user"
      - "Scalar values: later tier wins completely (replace)"
      - "Object values: recursive merge, applying rules at each level"
      - "Array values: strategy determined by per-key configuration"
      - "Null values: explicitly set null removes the key"
    code_examples:
      - language: javascript
        snippet: |
          function mergeSettings(base, override) {
            for (const key of Object.keys(override)) {
              if (isScalar(override[key])) {
                result[key] = override[key];  // Replace
              } else if (isObject(override[key])) {
                result[key] = mergeSettings(base[key] || {}, override[key]);
              } else if (isArray(override[key])) {
                result[key] = mergeArray(base[key], override[key], getStrategy(key));
              }
            }
            return result;
          }
        source: "docs/design/TDD-0042-settings.md:72"
    cross_references:
      - target: "tier-overview"
        relationship: depends_on
      - target: "array-strategies"
        relationship: extends

  - id: "array-strategies"
    heading: "Array Merge Strategies"
    authority_source: "docs/design/TDD-0042-settings.md"
    content_summary: "Arrays support three merge strategies configured per-key in settings schema. The strategy determines how array values from different tiers combine."
    key_points:
      - "replace (default): Higher tier array completely replaces lower tier"
      - "append: Higher tier items added after lower tier items"
      - "merge: Union of items with duplicates removed (set semantics)"
      - "Strategy is configured per-key in settings schema"
      - "Unknown keys default to 'replace' strategy"
    code_examples:
      - language: json
        snippet: |
          // settings.schema.json
          {
            "allowedTools": {
              "type": "array",
              "mergeStrategy": "merge"
            },
            "blockedCommands": {
              "type": "array",
              "mergeStrategy": "append"
            }
          }
        source: "docs/design/TDD-0042-settings.md:88"
      - language: yaml
        snippet: |
          # Example: merge strategy = "merge"
          skeleton: ["Read", "Write"]
          project:  ["Bash", "Grep"]
          result:   ["Read", "Write", "Bash", "Grep"]

          # Example: merge strategy = "append"
          skeleton: ["rm -rf /"]
          project:  ["sudo rm"]
          result:   ["rm -rf /", "sudo rm"]

          # Example: merge strategy = "replace" (default)
          skeleton: ["agent-a", "agent-b"]
          project:  ["agent-c"]
          result:   ["agent-c"]
        source: ".claude/skills/doc-ecosystem/INDEX.lego.md:265"
    cross_references:
      - target: "merge-algorithm"
        relationship: depends_on

  - id: "conflict-resolution"
    heading: "Conflict Resolution"
    authority_source: "docs/design/TDD-0042-settings.md"
    content_summary: "When tier values conflict beyond normal merge rules, explicit conflict resolution mechanisms apply. This includes type mismatches and schema violations."
    key_points:
      - "Type mismatch: higher tier wins, with warning logged"
      - "Schema violation: value rejected, falls back to lower tier"
      - "Circular references: detected and rejected with error"
      - "Missing required fields: populated from skeleton tier"
      - "Unknown fields: preserved but flagged in validation output"
    cross_references:
      - target: "merge-algorithm"
        relationship: extends

