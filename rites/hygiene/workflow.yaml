name: hygiene
workflow_type: sequential
description: Code quality lifecycle (Smell → Plan → Clean → Audit)

entry_point:
  agent: code-smeller
  artifact:
    type: smell-report
    path_template: docs/hygiene/SMELL-{slug}.md

phases:
  - name: assessment
    agent: code-smeller
    produces: smell-report
    next: planning

  - name: planning
    agent: architect-enforcer
    produces: refactor-plan
    next: execution

  - name: execution
    agent: janitor
    produces: commits
    next: audit

  - name: audit
    agent: audit-lead
    produces: audit-signoff
    next: null

complexity_levels:
  - name: SPOT
    scope: "Single smell fix"
    phases: [execution, audit]
  - name: MODULE
    scope: "Module-level cleanup"
    phases: [assessment, planning, execution, audit]
  - name: CODEBASE
    scope: "Full codebase hygiene"
    phases: [assessment, planning, execution, audit]

# Agent roles for command mapping:
# /architect  → architect-enforcer
# /build      → janitor
# /qa         → audit-lead
# /hotfix     → janitor (fast path)
# /code-review → audit-lead (review mode)

back_routes:
  - source_phase: audit
    trigger: "fail(acceptance_criteria)"
    target_phase: assessment
    target_agent: code-smeller
    requires_user_confirmation: true
    condition: "Failure is requirement gap, not implementation bug"

  - source_phase: audit
    trigger: "fail(implementation)"
    target_phase: execution
    target_agent: janitor
    requires_user_confirmation: false
    condition: "Failure is implementation bug"

  - source_phase: execution
    trigger: "design_conflict"
    target_phase: planning
    target_agent: architect-enforcer
    requires_user_confirmation: false
    condition: "Implementation reveals design flaw"
