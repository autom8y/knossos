# Rite Manifest: ui
# Generated per ADR-0015 (Content Organization)

name: ui
version: "1.0.0"
description: UI/UX development lifecycle from design system foundations through accessible, performant component delivery

# entry_agent: The agent CC invokes first via Task tool (orchestrator routing).
# This is distinct from workflow.yaml entry_point.agent (domain workflow entry).
entry_agent: potnia

phases:
  - name: foundation
    agent: design-system-architect
    produces: design-system-spec
    description: Define token taxonomy, component architecture, governance pipeline
    condition: "complexity >= SYSTEM"

  - name: strategy
    agent: rendering-architect
    produces: rendering-manifest
    description: Determine per-route rendering, hydration, performance budgets
    condition: "complexity >= MODULE"

  - name: styling
    agent: stylist
    produces: style-architecture
    description: CSS architecture, token-to-CSS mapping, layout/responsive/animation patterns
    condition: "complexity >= MODULE"

  - name: implementation
    agent: component-engineer
    produces: component-implementation
    description: Build components with state management, testing, structured output

  - name: validation
    agent: a11y-engineer
    produces: accessibility-report
    description: Validate WCAG 2.2 AA across four testing layers

agents:
  - name: potnia
    role: Coordinates UI development phases and routes work to specialists

  - name: design-system-architect
    role: Defines token taxonomy, component architecture, and governance pipeline

  - name: rendering-architect
    role: Determines per-route rendering strategy, hydration, and performance budgets

  - name: stylist
    role: Translates design tokens into CSS architecture, layout patterns, and visual implementation

  - name: component-engineer
    role: Implements components with state management, testing, and structured output

  - name: a11y-engineer
    role: Validates WCAG 2.2 AA compliance and gates accessibility quality

  - name: frontend-fanatic
    role: Browser-first visual auditing and UX evaluation through a designer's lens

dromena:
  - ui-ref
  - component-audit
  - a11y-check
  - perf-budget

legomena:
  - ui-design-systems
  - ui-quality
  - ui-architecture
  - ui-ref
  - aesthetic-evaluation

hooks: []

mcp_pools:
  - pool: browser-local

dependencies:
  - shared

complexity_levels:
  - name: TASK
    scope: "Single component, <200 LOC"
  - name: MODULE
    scope: "Feature area or page, 3-10 components"
  - name: SYSTEM
    scope: "Design system overhaul, cross-cutting changes"

metadata:
  domain: UI/UX development
  color: pink
