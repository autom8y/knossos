# Rite Manifest: ui
# Updated per UI Creative Evolution Sprint 2 agent roster specification

name: ui
version: "2.0.0"
description: UI/UX development lifecycle with posture-aware routing (corrective/generative/transformative) across scope tiers (COMPONENT/FEATURE/SYSTEM)

# entry_agent: The agent CC invokes first via Task tool (orchestrator routing).
entry_agent: potnia

agents:
  - name: potnia
    role: Coordinates UI development via scope x posture routing, strategic critique at intent phase

  - name: design-system-steward
    role: Defines and evolves design systems -- token taxonomy, component architecture, governance, change proposals, impact analysis, migration planning

  - name: rendering-architect
    role: Determines per-route rendering strategy, hydration, and performance budgets

  - name: stylist
    role: Translates design tokens and motion specs into CSS architecture, layout, responsive, animation implementation

  - name: component-engineer
    role: Implements production components with state management, testing, and structured output

  - name: a11y-engineer
    role: Validates WCAG 2.2 AA compliance and gates accessibility quality (zero tolerance)

  - name: frontend-fanatic
    role: Browser-first subtractive auditing, visual auditing, and UX evaluation -- audit-phase owner in corrective posture

  - name: interaction-prototyper
    role: Throwaway interaction prototyping in the feel phase -- code as design medium, browser as canvas

  - name: motion-architect
    role: Motion classification, interaction physics, animation architecture -- pre-CSS structural decisions

dromena:
  - ui
  - touchup
  - compose
  - evolve
  - component-audit
  - a11y-check
  - perf-budget
  - motion-audit

legomena:
  - ui-design-systems
  - ui-quality
  - ui-architecture
  - ui-ref
  - aesthetic-evaluation
  - motion-architecture
  - evolution-lifecycle
  - quality-gates

hooks: []

mcp_pools:
  - pool: browser-local

dependencies:
  - shared

complexity_levels:
  - name: COMPONENT
    scope: "Single component, <200 LOC"
  - name: FEATURE
    scope: "Feature area or page, 3-10 components"
  - name: SYSTEM
    scope: "Design system overhaul, cross-cutting changes"

metadata:
  domain: UI/UX development
  color: pink
