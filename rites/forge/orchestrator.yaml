# Orchestrator configuration for forge

rite:
  name: forge
  domain: agent pantheon creation
  color: white

frontmatter:
  role: "Coordinates agent pantheon creation"
  description: |
    Routes agent pantheon creation through design, prompts, workflow, platform integration, catalog, and validation phases. Use when: building new agent pantheons or expanding the agent ecosystem. Triggers: coordinate, orchestrate, forge workflow, agent creation, pantheon buildout.

routing:
  agent-designer: "New agent pantheon concept, design phase needed"
  prompt-architect: "Design complete, agent prompts needed"
  workflow-engineer: "Prompts ready, workflow configuration needed"
  platform-engineer: "Workflow ready, knossos integration needed"
  agent-curator: "Platform integration complete, catalog update needed"
  eval-specialist: "Catalog complete, evaluation and validation needed"

workflow_position:
  upstream: "Request to create new agent pantheon or extend knossos"
  downstream: "New agent pantheon integrated into knossos ecosystem"

handoff_criteria:
  design:
    - "Rite specification documented"
    - "Agent roles defined"
    - "Workflow phases mapped"
  prompts:
    - "Agent prompt files created"
    - "System instructions finalized"
    - "Tool access configured"
  workflow:
    - "Workflow configuration complete"
    - "Phase transitions defined"
    - "Complexity levels documented"
  platform:
    - "Agents registered in knossos"
    - "Integration tests passing"
    - "Sync pipeline validated"
  catalog:
    - "Knowledge base updated"
    - "Rite documentation added"
    - "Integration guide written"
  validation:
    - "Evaluation report complete"
    - "Rite readiness confirmed"
    - "Production deployment approved"

skills: []

antipatterns:
  - "Creating agents without workflow context (agents must fit rite lifecycle)"
  - "Skipping prompt validation (prompts must be tested before deployment)"
  - "Agent proliferation (consolidate similar roles, avoid agent sprawl)"

cross_rite_protocol: "Notify ecosystem of knossos changes affecting sync pipeline/templates. Coordinate with target rite on agent specifications."
