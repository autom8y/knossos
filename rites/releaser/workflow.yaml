name: releaser
workflow_type: sequential
description: Multi-repo release orchestration lifecycle (Reconnaissance -> Dependencies -> Planning -> Execution -> Verification)

entry_point:
  agent: potnia  # Orchestrator entry; potnia routes to cartographer for reconnaissance
  first_phase: reconnaissance
  first_phase_agent: cartographer

phases:
  - name: reconnaissance
    agent: cartographer
    produces: platform-state-map
    next: dependency-analysis

  - name: dependency-analysis
    agent: dependency-resolver
    produces: dependency-graph
    next: release-planning
    condition: "complexity >= RELEASE"

  - name: release-planning
    agent: release-planner
    produces: release-plan
    next: execution
    condition: "complexity >= RELEASE"

  - name: execution
    agent: release-executor
    produces: execution-ledger
    next: verification

  - name: verification
    agent: pipeline-monitor
    produces: verification-report
    next: null

complexity_levels:
  - name: PATCH
    scope: "Single repo push + CI watch. Auto-escalates to RELEASE if downstream dependents detected."
    phases: [reconnaissance, execution, verification]

  - name: RELEASE
    scope: "SDK publish + consumer version bumps across dependency graph"
    phases: [reconnaissance, dependency-analysis, release-planning, execution, verification]

  - name: PLATFORM
    scope: "Full platform release — all repos, full DAG, extended CI monitoring"
    phases: [reconnaissance, dependency-analysis, release-planning, execution, verification]

# Agent roles for command mapping:
# /releaser          -> potnia (orchestrated, determines PATCH vs RELEASE vs PLATFORM)
# Direct Task        -> cartographer (recon-only, no orchestration)

# Auto-escalation protocol:
# At PATCH complexity, after reconnaissance completes, Potnia reads the
# platform-state-map.yaml and checks the has_dependents flag on the target repo.
# If has_dependents: true, Potnia auto-escalates to RELEASE complexity and
# continues from the dependency-analysis phase. This is Potnia's responsibility
# — the workflow engine treats it as a complexity upgrade mid-flight.

# Artifact chain:
# .sos/wip/release/
#   platform-state-map.yaml   (cartographer -> dependency-resolver, release-planner, release-executor)
#   platform-state-map.md     (cartographer -> user)
#   dependency-graph.yaml     (dependency-resolver -> release-planner)
#   dependency-graph.md       (dependency-resolver -> user)
#   release-plan.yaml         (release-planner -> release-executor)
#   release-plan.md           (release-planner -> user)
#   execution-ledger.yaml     (release-executor -> pipeline-monitor)
#   execution-ledger.md       (release-executor -> user)
#   verification-report.yaml  (pipeline-monitor -> potnia)
#   verification-report.md    (pipeline-monitor -> user)

back_routes:
  - source_phase: verification
    trigger: "partial_failure"
    target_phase: execution
    target_agent: release-executor
    requires_user_confirmation: true
    condition: "CI failures on specific repos suggest retry of failed branches only"

  - source_phase: execution
    trigger: "plan_conflict"
    target_phase: release-planning
    target_agent: release-planner
    requires_user_confirmation: true
    condition: "Execution discovers publish commands are incorrect or versions have drifted since planning"
    complexity: ">= RELEASE"
