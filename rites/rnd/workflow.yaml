name: rnd
workflow_type: sequential
description: Technology scouting, integration analysis, prototyping, and future architecture

entry_point:
  agent: technology-scout
  artifact:
    type: tech-assessment
    path_template: docs/rnd/SCOUT-{slug}.md

phases:
  - name: scouting
    agent: technology-scout
    produces: tech-assessment
    next: integration-analysis

  - name: integration-analysis
    agent: integration-researcher
    produces: integration-map
    next: prototyping
    condition: "complexity >= EVALUATION"

  - name: prototyping
    agent: prototype-engineer
    produces: prototype
    next: future-architecture

  - name: future-architecture
    agent: moonshot-architect
    produces: moonshot-plan
    next: transfer

  - name: transfer
    agent: tech-transfer
    produces: tech-transfer-package
    next: null
    condition: "complexity >= EVALUATION"

complexity_levels:
  - name: SPIKE
    scope: "Quick feasibility check, single technology"
    phases: [scouting, prototyping]

  - name: EVALUATION
    scope: "Full technology evaluation with integration analysis"
    phases: [scouting, integration-analysis, prototyping, future-architecture, transfer]

  - name: MOONSHOT
    scope: "Paradigm shift exploration, multi-year architecture"
    phases: [scouting, integration-analysis, prototyping, future-architecture, transfer]

# Agent roles for command mapping:
# /architect   → integration-researcher
# /build       → prototype-engineer
# /qa          → moonshot-architect
# /hotfix      → (N/A - R&D rite)
# /code-review → (N/A - R&D rite)

back_routes:
  - source_phase: future-architecture
    trigger: "fail(acceptance_criteria)"
    target_phase: scouting
    target_agent: technology-scout
    requires_user_confirmation: true
    condition: "Failure is requirement gap, not implementation bug"

  - source_phase: future-architecture
    trigger: "fail(implementation)"
    target_phase: prototyping
    target_agent: prototype-engineer
    requires_user_confirmation: false
    condition: "Failure is implementation bug"

  - source_phase: prototyping
    trigger: "design_conflict"
    target_phase: integration-analysis
    target_agent: integration-researcher
    requires_user_confirmation: false
    condition: "Implementation reveals design flaw"
