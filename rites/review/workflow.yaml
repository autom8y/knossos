name: review
workflow_type: sequential
description: Language-agnostic code review lifecycle (Scan -> Assess -> Report)

# entry_point: The first specialist in the domain workflow (not the CC routing agent).
# The CC routing agent is manifest.yaml:entry_agent (always potnia for orchestrated rites).
entry_point:
  agent: signal-sifter
  artifact:
    type: scan-findings
    path_template: .sos/wip/review/SCAN-{slug}.md

phases:
  - name: scan
    agent: signal-sifter
    produces: scan-findings
    next: assess

  - name: assess
    agent: pattern-profiler
    produces: assessment
    next: report
    condition: "complexity == FULL"

  - name: report
    agent: case-reporter
    produces: review-report
    next: null

complexity_levels:
  - name: QUICK
    scope: "Focused triage of specific files or module, scan + report only"
    phases: [scan, report]

  - name: FULL
    scope: "Complete repository review with health grading and cross-rite routing"
    phases: [scan, assess, report]

# Agent roles for command mapping:
# /review          -> potnia (orchestrated, determines QUICK vs FULL)
# Direct Task      -> signal-sifter (scan-only, no orchestration)

back_routes:
  - source_phase: assess
    trigger: "coverage_gap"
    target_phase: scan
    target_agent: signal-sifter
    requires_user_confirmation: false
    condition: "Assessment reveals areas not scanned or insufficiently covered"

  - source_phase: report
    trigger: "assessment_gap"
    target_phase: assess
    target_agent: pattern-profiler
    requires_user_confirmation: false
    condition: "Report synthesis reveals findings without severity or ungrouped themes"
