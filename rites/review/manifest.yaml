# Rite Manifest: review
# Simplest multi-phase orchestrated workflow -- works on any codebase.

name: review
version: "1.0.0"
description: Language-agnostic code review lifecycle (Scan -> Assess -> Report)

# entry_agent: The agent CC invokes first via Task tool (orchestrator routing).
# This is distinct from workflow.yaml entry_point.agent (domain workflow entry).
entry_agent: potnia

phases:
  - name: scan
    agent: signal-sifter
    produces: scan-findings
    description: Sift codebase structure for signals using language-agnostic heuristics

  - name: assess
    agent: pattern-profiler
    produces: assessment
    description: Profile patterns across signals, assign severity and health grades

  - name: report
    agent: case-reporter
    produces: review-report
    description: Write the definitive case file with health report card and routing

agents:
  - name: potnia
    role: Coordinates code review phases, gates complexity, manages back-routes
    archetype: orchestrator

  - name: signal-sifter
    role: Reads codebase and sifts signal from noise using structural heuristics

  - name: pattern-profiler
    role: Connects dots across signals, builds severity profile and health grades

  - name: case-reporter
    role: Writes the definitive case file with health report card

agent_defaults:
  type: specialist
  model: sonnet
  maxTurns: 30
  disallowedTools:
    - Edit
    - NotebookEdit

skill_policies:
  - skill: review-ref
    mode: inject
    requires_tools: [Read]

dromena:
  - review-switch

legomena:
  - review-ref

hooks:
  - agent-guard

hook_defaults:
  write_guard:
    allow_paths: [".sos/wip/review/"]

dependencies:
  - shared

complexity_levels:
  - name: QUICK
    scope: "Focused triage of specific files or module"
    phases: [scan, report]
  - name: FULL
    scope: "Complete repository review with health grading"
    phases: [scan, assess, report]

metadata:
  domain: code review
  color: cyan
