name: security
workflow_type: sequential
description: Security assessment, compliance mapping, penetration testing, and review

entry_point:
  # Default entry for standalone security workflows
  default:
    agent: threat-modeler
    artifact:
      type: threat-model
      path_template: docs/security/THREAT-{slug}.md

  # Consultation entry for cross-rite invocation (e.g., from 10x-dev)
  consultation:
    agent: threat-modeler
    mode: advisory
    artifact:
      type: security-review
      path_template: docs/security/REVIEW-{slug}.md

# External consultation support
# Allows other teams (primarily 10x-dev) to invoke threat-modeler
# for design review without running full security workflow
external_consultation:
  enabled: true
  allowed_invokers:
    - rite: 10x-dev
      agents: [architect, orchestrator]
    - rite: sre
      agents: [incident-commander]

  # Pre-implementation phase for design review
  pre_implementation:
    agent: threat-modeler
    mode: advisory  # Produces recommendations, not blocking
    inputs:
      - tdd_draft: "Draft Technical Design Document"
      - security_domains: "Identified security-sensitive areas"
      - complexity: "Work complexity level"
    outputs:
      - security_recommendations: "Specific security guidance for TDD"
      - threat_considerations: "Threats to address in design"
      - compliance_flags: "Relevant compliance requirements"
    artifact:
      type: security-advisory
      path_template: docs/security/ADVISORY-{slug}.md

  # Consultation flow (does not continue to full security phases)
  consultation_phases:
    - name: design-review
      agent: threat-modeler
      produces: security-advisory
      next: null  # Advisory only, returns to caller

  # Full handoff option (continue with security workflow)
  handoff_to_full_workflow:
    trigger: "advisory.severity == 'critical' OR advisory.requires_pentest == true"
    description: "Critical findings trigger full security workflow"
    next_phase: threat-modeling

phases:
  - name: threat-modeling
    agent: threat-modeler
    produces: threat-model
    next: compliance-design

  - name: compliance-design
    agent: compliance-architect
    produces: compliance-requirements
    next: penetration-testing
    condition: "complexity >= FEATURE"

  - name: penetration-testing
    agent: penetration-tester
    produces: pentest-report
    next: security-review

  - name: security-review
    agent: security-reviewer
    produces: security-signoff
    next: null

complexity_levels:
  - name: PATCH
    scope: "Single file change, no auth/crypto/PII impact"
    phases: [penetration-testing, security-review]

  - name: FEATURE
    scope: "New endpoints, data handling, session management"
    phases: [threat-modeling, compliance-design, penetration-testing, security-review]

  - name: SYSTEM
    scope: "Auth systems, cryptography, external integrations, PII processing"
    phases: [threat-modeling, compliance-design, penetration-testing, security-review]

# Agent roles for command mapping:
# /architect   → compliance-architect
# /build       → penetration-tester
# /qa          → security-reviewer
# /hotfix      → penetration-tester (fast path)
# /code-review → security-reviewer

back_routes:
  - source_phase: security-review
    trigger: "fail(acceptance_criteria)"
    target_phase: threat-modeling
    target_agent: threat-modeler
    requires_user_confirmation: true
    condition: "Failure is requirement gap, not implementation bug"

  - source_phase: security-review
    trigger: "fail(implementation)"
    target_phase: penetration-testing
    target_agent: penetration-tester
    requires_user_confirmation: false
    condition: "Failure is implementation bug"

  - source_phase: penetration-testing
    trigger: "design_conflict"
    target_phase: compliance-design
    target_agent: compliance-architect
    requires_user_confirmation: false
    condition: "Implementation reveals design flaw"
