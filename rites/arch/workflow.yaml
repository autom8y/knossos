name: arch
version: "1.0.0"
workflow_type: sequential
description: Architecture analysis producing topology maps, dependency analysis, and remediation plans

inputs:
  - name: analysis_unit
    type: string
    description: "Type of analysis unit: repo, directory, or module"
    allowed_values: [repo, directory, module]
    default: repo

entry_point:
  agent: topology-cartographer
  artifact:
    type: topology-inventory
    path_template: docs/architecture/TOPOLOGY-{slug}.md

phases:
  - name: discovery
    agent: topology-cartographer
    produces: topology-inventory
    next: synthesis

  - name: synthesis
    agent: dependency-analyst
    produces: dependency-map
    next: evaluation
    condition: "complexity >= ANALYSIS"

  - name: evaluation
    agent: structure-evaluator
    produces: architecture-assessment
    next: remediation
    condition: "complexity >= ANALYSIS"

  - name: remediation
    agent: remediation-planner
    produces: architecture-report
    next: null
    condition: "complexity >= ANALYSIS"

complexity_levels:
  - name: SURVEY
    scope: "30,000ft ecosystem snapshot: service catalog, tech stacks, API surfaces"
    phases: [discovery]

  - name: ANALYSIS
    scope: "Full topology + per-unit analysis, cross-unit dependency tracing, structural evaluation, recommendations"
    phases: [discovery, synthesis, evaluation, remediation]

  - name: DEEP-DIVE
    scope: "All ANALYSIS work + 1,000ft coupling hotspot deep dives, philosophy extraction, migration readiness, phased roadmap"
    phases: [discovery, synthesis, evaluation, remediation]

# Agent roles for command mapping:
# /arch              -> topology-cartographer (full pipeline)
# /arch-discover     -> topology-cartographer (discovery only)
# /arch-dependencies -> dependency-analyst (synthesis only)
# /arch-evaluate     -> structure-evaluator (evaluation only)
# /arch-remediate    -> remediation-planner (remediation only)

# Rite-specific commands (synced on rite swap):
commands:
  - name: arch
    file: arch.md
    description: "Switch to arch rite for multi-repo architecture analysis"
    primary_agent: topology-cartographer
    workflow_phase: all

back_routes:
  # ADVISORY: These do not alter the sequential phase structure.
  # Pythia reads these to decide when to recommend re-invocation of an earlier phase.
  - from: synthesis
    to: discovery
    trigger: "Incomplete topology-inventory: missing API surfaces or unscanned units"
  - from: evaluation
    to: synthesis
    trigger: "Incomplete dependency-map: missing coupling scores or unclassified integration patterns"
  - from: remediation
    to: evaluation
    trigger: "Incomplete architecture-assessment: findings lack evidence or leverage ratings"
