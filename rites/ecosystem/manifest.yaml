# Rite Manifest: ecosystem
# Generated per ADR-0015 (Content Organization)

name: ecosystem
version: "1.0.0"
description: Ecosystem infrastructure lifecycle for sync pipeline/knossos changes (Analysis -> Design -> Implementation -> Documentation -> Validation)

entry_agent: orchestrator

phases:
  - name: analysis
    agent: ecosystem-analyst
    produces: gap-analysis
    description: Analyze ecosystem gaps and trace issues to root causes

  - name: design
    agent: context-architect
    produces: context-design
    description: Design schemas, compatibility plans, and migration paths
    condition: "complexity >= MODULE"

  - name: implementation
    agent: integration-engineer
    produces: implementation
    description: Implement sync pipeline and knossos infrastructure changes

  - name: documentation
    agent: documentation-engineer
    produces: migration-runbook
    description: Document migrations and create runbooks
    condition: "complexity >= MODULE"

  - name: validation
    agent: compatibility-tester
    produces: compatibility-report
    description: Validate ecosystem changes across satellite diversity

agents:
  - name: orchestrator
    role: Coordinates ecosystem infrastructure phases

  - name: ecosystem-analyst
    role: Traces sync pipeline/knossos problems to root causes and produces gap analysis

  - name: context-architect
    role: Designs context solutions, schemas, and ecosystem patterns

  - name: integration-engineer
    role: Implements sync pipeline and knossos changes with integration tests

  - name: documentation-engineer
    role: Creates migration runbooks and compatibility documentation

  - name: compatibility-tester
    role: Validates ecosystem changes across satellite configurations

dromena: []

legomena:
  - claude-md-architecture
  - doc-ecosystem
  - ecosystem-ref

hooks: []

dependencies:
  - shared

complexity_levels:
  - name: PATCH
    scope: "Single file/config change, no schema impact"
  - name: MODULE
    scope: "Single system (sync pipeline or knossos)"
  - name: SYSTEM
    scope: "Multi-system change affecting sync pipeline + knossos"
  - name: MIGRATION
    scope: "Cross-satellite rollout requiring coordination"

metadata:
  domain: ecosystem infrastructure
  color: "#8B00FF"

mcp_servers:
  - name: go-semantic
    command: go-semantic-mcp
    args: []
  - name: terraform
    command: npx
    args: ["-y", "@modelcontextprotocol/server-terraform"]
