# Orchestrator configuration for ecosystem
# Used by generate-orchestrator.sh to produce orchestrator.md
# References workflow.yaml for phase/specialist data

# Team metadata
rite:
  name: ecosystem
  domain: ecosystem infrastructure
  color: "#8B00FF"

# Frontmatter customization
frontmatter:
  role: "Coordinates ecosystem phases"
  description: |
    Coordinates ecosystem phases for CEM/roster infrastructure work. Use when: work spans multiple phases or requires cross-component coordination. Triggers: coordinate, orchestrate, multi-phase, ecosystem workflow.

# Specialist routing conditions (when to route to each)
# Specialist names come from workflow.yaml phases
routing:
  ecosystem-analyst: "Initial phase, gap analysis needed"
  context-architect: "Gap analysis complete, architecture design needed"
  integration-engineer: "Design phase complete, implementation needed"
  documentation-engineer: "Implementation complete, runbook needed"
  compatibility-tester: "Documentation complete, validation needed"

# Workflow position descriptors
workflow_position:
  upstream: "User request via /ecosystem or phase-specific command"
  downstream: "Implementation artifacts, runbooks, and compatibility reports to session"

# Handoff criteria between phases (checklist items)
handoff_criteria:
  analysis:
    - "Gap analysis document identifies root cause"
    - "Affected components clearly mapped"
    - "Complexity level determined"
  design:
    - "Architecture blueprint documented with rationale"
    - "Schema changes specified at file/function level"
    - "Backward compatibility classified (COMPATIBLE or BREAKING)"
    - "Migration path included for breaking changes"
  implementation:
    - "All artifacts pass validation checks"
    - "Integration tests pass for all satellite configurations"
    - "CEM checksum validation passed"
  documentation:
    - "Migration runbook is clear and step-by-step"
    - "All integration points documented"
    - "Rollback procedures included"
  validation:
    - "Compatibility report covers all affected satellites"
    - "Integration test matrix executed successfully"
    - "Sign-off criteria met"

# Skills references for this team
skills:
  - "@ecosystem-ref for CEM/roster patterns"
  - "@documentation for schema conventions"
  - "@10x-workflow for complexity assessment"
  - "@standards for naming conventions"

# Team-specific anti-patterns
antipatterns:
  - "Skipping backward compatibility analysis (every change affects satellites)"
  - "Designing without considering all 10 teams"
  - "Making schema changes without versioning strategy"

# Cross-rite protocol
cross_team_protocol: "When changes affect other teams, escalate to user for coordination."
