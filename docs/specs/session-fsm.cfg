\* TLC Configuration for session-fsm.tla
\* Session State Machine Model Checking Configuration
\*
\* Usage:
\*   java -cp tla2tools.jar tlc2.TLC -config session-fsm.cfg session-fsm.tla

\* Constants - use small values for fast checking
CONSTANTS
    MaxProcesses = 2
    Phases = {"requirements", "design", "implementation", "validation"}

\* Specification to check
SPECIFICATION Spec

\* Safety invariants to verify
INVARIANT Safety

\* Liveness properties to verify
PROPERTY LockEventuallyGranted

\* Additional checks (uncomment as needed)
\* PROPERTY ParkedSessionsProgress
\* INVARIANT NoInvalidTransitions

\* Counterexample property (expected to FAIL - demonstrates current bug)
\* Uncomment to verify the race condition exists in the old model:
\* INVARIANT NoStaleReads
