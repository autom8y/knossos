version: "2"

linters:
  default: none
  enable:
    - modernize
    - errorlint
    - gocritic
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    gocritic: {}
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (io.Writer).Write
        - (*os.File).Close
        - (*os.File).Write
        - os.Remove
        - os.RemoveAll
        - os.Setenv
        - os.Unsetenv
        - os.WriteFile
        - os.Mkdir
        - os.MkdirAll
        - os.Chmod
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Print
        - fmt.Printf
        - fmt.Println

issues:
  exclusions:
    rules:
      - path: ".*_test\\.go"
        linters:
          - errcheck
