version: "2"

linters:
  default: standard
  enable:
    - modernize
    - errorlint
    - gocritic
  settings:
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    gocritic: {}
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Print
        - fmt.Printf
        - fmt.Println
        - (io.Writer).Write
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: _test\.go
        text: "SA5011"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
