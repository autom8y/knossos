# Complexity Scale Mapping
# Maps rite-specific complexity levels to meta-scale for cross-rite coordination

schema_version: "1.0"

meta_scale:
  description: "Universal 4-tier complexity scale for cross-rite communication"
  tiers:
    - name: PATCH
      description: "Single file/config change, minimal coordination"
      typical_phases: 1-2
      typical_duration: "< 1 day"

    - name: MODULE
      description: "Single component/service, standard lifecycle"
      typical_phases: 3-4
      typical_duration: "1-5 days"

    - name: SYSTEM
      description: "Multiple components, cross-cutting concerns"
      typical_phases: 4-5
      typical_duration: "1-2 weeks"

    - name: PLATFORM
      description: "Architectural change, ecosystem-wide impact"
      typical_phases: 5+
      typical_duration: "2+ weeks"

rite_mappings:
  # Development rites
  10x-dev:
    SCRIPT: PATCH
    MODULE: MODULE
    SERVICE: SYSTEM
    PLATFORM: PLATFORM

  # Ecosystem rites
  ecosystem:
    PATCH: PATCH
    MODULE: MODULE
    SYSTEM: SYSTEM
    MIGRATION: PLATFORM

  # Security rites
  security:
    PATCH: PATCH
    MODULE: MODULE
    SERVICE: SYSTEM
    PLATFORM: PLATFORM

  # Research rites
  rnd:
    SPIKE: PATCH
    EXPLORATION: MODULE
    PROTOTYPE: SYSTEM
    PLATFORM_RESEARCH: PLATFORM

  # Documentation rites
  docs:
    PAGE: PATCH
    SECTION: MODULE
    GUIDE: SYSTEM
    DOCUMENTATION_SYSTEM: PLATFORM

  # Hygiene rites
  hygiene:
    LINT_FIX: PATCH
    REFACTOR: MODULE
    CLEANUP: SYSTEM
    MIGRATION: PLATFORM

  # Debt rites
  debt-triage:
    QUICK_WIN: PATCH
    FOCUSED: MODULE
    STRATEGIC: SYSTEM
    ARCHITECTURAL: PLATFORM

  # SRE rites
  sre:
    INCIDENT: PATCH
    IMPROVEMENT: MODULE
    RELIABILITY: SYSTEM
    PLATFORM_SRE: PLATFORM

  # Intelligence rites
  intelligence:
    QUERY: PATCH
    ANALYSIS: MODULE
    RESEARCH: SYSTEM
    PLATFORM_ANALYTICS: PLATFORM

  # Strategy rites
  strategy:
    INSIGHT: PATCH
    INITIATIVE: MODULE
    STRATEGY: SYSTEM
    VISION: PLATFORM

  # Forge rites
  forge:
    AGENT_FIX: PATCH
    AGENT: MODULE
    TEAM: SYSTEM
    ECOSYSTEM: PLATFORM

# Cross-rite routing rules
routing_rules:
  - description: "PLATFORM complexity requires orchestrator consultation"
    condition: "meta_complexity == PLATFORM"
    action: "invoke_orchestrator before specialist"

  - description: "Cross-rite work requires hub rite notification"
    condition: "affects_multiple_rites == true"
    action: "notify ecosystem or forge"

  - description: "Security-critical work requires security review"
    condition: "security_impact == true and meta_complexity >= MODULE"
    action: "route through security after implementation"
